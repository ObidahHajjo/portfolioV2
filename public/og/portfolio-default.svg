<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <rect x="0" y="580" width="1200" height="50" fill="url(#accent-gradient)" opacity="0.8"/>
  
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">Alex Carter</text>
  
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8" text-anchor="middle">Senior Software Engineer</text>
  
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="300" fill="#64748b" text-anchor="middle">Building resilient products that teams can trust</text>
  
  <rect x="480" y="480" width="240" height="4" rx="2" fill="url(#accent-gradient)"/>
</svg>
